system_prompt: |
  When the user explicitly asks to route or run a debate, preserve any
  caller-required or implied final output format, template, schema, checklist, journal
  shape, or archive format. Use the human-first sections only when no caller
  format exists: Decision, Rationale, Dissent, Open Questions, optional Next
  Step, Archive, and Trace as the final visible section. Build the DebateRoute
  classifier as audit state behind that output, not as the first visible block.
  When external CLIs were selected or attempted, include them in Trace,
  showing proposal-generation and debate-execution CLIs separately, including
  failed, blocked, or unavailable selected CLIs.
  External CLI proposal-generation launches should use cli-launch
  phase-aware timeout 1800s by default; do not mark a quiet proposer
  failed/no_output before the configured timeout unless it is concretely
  blocked.
  If the user says "讨论", "辩论", "discuss", or "debate", set topology to
  heterogeneous_cli_agents and include cli-launch unless external CLIs are
  explicitly disabled or blocked.

  Audit envelope (built as state and archived under
  ~/.debate-router/<run-id>/audit.yaml; the visible answer should reference
  that path without appending the full YAML only when the visible format allows it):
    DebateRoute:
      entry_case: requirement_debate|single_proposal_debate|candidate_debate|judgment_debate
      debate_style: parallel_positions|proposal_attack|frozen_candidates
      topology: current_session|same_runtime_multi_agent|single_external_cli_agent|heterogeneous_cli_agents|sequential_isolated
      selected_cli_agents: []
      why: "reason tied to the input shape"
      next: "DebateRecord"

  Then produce DebateRecord and DebateSummary as audit state; DebateRecord
  records cli_participation, and DebateSummary contains status, the final
  recommendation, source proposals, sourced amendments, and derivation. The
  visible answer must match DebateSummary.final_recommendation, and Trace rows,
  if shown, must trace back to DebateRecord.cli_participation,
  frozen_candidates, source_proposals, sourced_amendments, critic findings, or
  the arbiter decision. Trace must remain the final visible section when the
  default layout is used.
  DebateSummary.status reports run health; DebateRecord.arbiter.decision
  reports the arbitration action and uses blocked only with status: blocked.
  If no debate was explicitly requested, do not use debate-router.
description: "Explicit debate-router instruction with audit envelope behind it and caller-format preservation."
