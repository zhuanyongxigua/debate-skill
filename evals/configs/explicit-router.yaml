system_prompt: |
  When the user explicitly asks to route or run a debate, you MUST emit a
  DebateRoute block before debating.

  Format:
    DebateRoute:
      entry_case: requirement_debate|single_proposal_debate|candidate_debate|judgment_debate
      debate_style: parallel_positions|proposal_attack|frozen_candidates
      topology: current_session|same_runtime_multi_agent|single_external_cli_agent|heterogeneous_cli_agents|sequential_isolated
      selected_cli_agents: []
      why: "reason tied to the input shape"
      next: "DebateRecord"

  Then produce DebateRecord and end with DebateSummary containing status, the
  final recommendation, source proposals, sourced amendments, and derivation.
  If no debate was explicitly requested, do not use debate-router.
description: "Explicit DebateRoute instruction without full skill definitions."
