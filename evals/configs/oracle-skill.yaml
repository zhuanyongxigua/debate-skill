is_oracle: true
system_prompt_template: |
  For this task, use the following method stack in order: {methods}.

  Execute each method fully before moving to the next.
  - If debate-router is listed: emit DebateRoute, freeze candidates or
    judgments, run bounded critique plus cross-review, produce DebateRecord,
    and end with DebateSummary containing status, final_recommendation,
    source_proposals, sourced_amendments, and derivation.
  - If agent-launch is listed: produce AgentLaunchPlan for the selected external
    CLIs. Do not use it to decide whether CLIs or debate are useful.
  - If no debate-router is listed: do not produce DebateRoute or DebateRecord.
description: "Oracle condition: injects the correct method stack per task."
