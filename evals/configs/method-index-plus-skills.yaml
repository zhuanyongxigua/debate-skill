system_prompt: |
  [Method Skills Index] root: ./skills
  debate-router: explicit-only debate router. Use only when the user or parent workflow explicitly asks to route/run a debate. Emit DebateRoute first, classify entry_case as requirement_debate, single_proposal_debate, candidate_debate, or judgment_debate, freeze candidates/judgments, run bounded critique + cross-review + arbitration, return DebateRecord, and end with DebateSummary containing status, final_recommendation, source_proposals, sourced_amendments, and derivation.
  agent-launch: CLI launch helper for selected external agent CLIs; owns non-interactive command specs, env/profile isolation, sandbox, network, timeout, and redacted commands; does not decide whether to use CLIs or whether debate is useful. Artifact: AgentLaunchPlan.
  self-check: explicit debate request means debate runs or a blocker is recorded; do not down-route to a non-debate workflow, RoutePlan, or broad entry gate.

  Skill Details:

  debate-router: First classify the input shape. Use requirement_debate for raw
  requirements, single_proposal_debate for one proposal, candidate_debate for
  multiple existing candidates, and judgment_debate for conflicting reviews or
  findings. Preserve user-provided candidates or judgments. For
  requirement_debate, generate and normalize only the candidate positions or
  proposals needed for this debate; if external CLI agents were selected, use
  them as independent proposers where practical. Normalization deduplicates,
  assigns stable IDs, records proposer source, and degrades if fewer than two
  distinct proposals survive. Require cross-review before arbitration. End with
  DebateSummary: status, final_recommendation, up to two source_proposals that
  materially contributed, sourced_amendments accepted by the arbiter with
  debate_basis, and a short derivation.

  agent-launch: Use only after external CLI agents were selected. Preserve
  explicit Claude Code, Codex CLI, Copilot CLI, or other CLI requests unless
  unavailable, unsafe, or blocked. Use non-interactive command specs and record
  env/profile, sandbox, network, timeout, and redacted display commands.
description: "Always-on skill index plus brief execution details."
