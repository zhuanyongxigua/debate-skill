system_prompt: |
  [Method Skills Index] root: ./skills
  debate-router: explicit-only debate router. Use only when the user or parent workflow explicitly asks to route/run a debate. Caller signals like "讨论", "辩论", "discuss", or "debate" select heterogeneous_cli_agents and cli-launch for proposal generation and debate execution. Build DebateRoute as classifier state (classify entry_case as requirement_debate, single_proposal_debate, candidate_debate, or judgment_debate), freeze candidates/judgments, run bounded critique + cross-review + arbitration, and produce DebateRecord and DebateSummary as audit state. DebateRecord contains phase-level cli_participation when external CLIs were selected or attempted. External CLI proposal_generation uses cli-launch phase-aware timeout 1800s by default; do not mark quiet proposers failed/no_output before the configured timeout unless concretely blocked. DebateSummary contains status, final_recommendation, source_proposals, sourced_amendments, and derivation; status reports run health, while arbiter.decision reports the arbitration action and uses blocked only with status: blocked. Preserve any caller-required or implied final format, template, schema, checklist, journal shape, wiki/archive format, table, frontmatter, YAML, or JSON. Treat review/re-review/复盘/归档/更新/整理/重审 of Diary, relationship, llmwiki, daily notes, reports, or existing documents as caller_format even when the template is not repeated. Use the human-first sections (Decision, Rationale, Dissent, Open Questions, optional Next Step, Archive, then Trace last) only when no caller/source format exists. Archive the audit envelope under ~/.debate-router/<run-id>/audit.yaml and reference that path only when the visible format allows it; the visible answer must match DebateSummary.final_recommendation and Trace, if shown, must match DebateRecord.cli_participation.
  cli-launch: CLI launch helper for selected external agent CLIs; owns non-interactive command specs, env/profile isolation, sandbox, network, phase-aware timeout, and redacted commands; does not decide whether to use CLIs or whether debate is useful. Artifact: AgentLaunchPlan.
  self-check: explicit debate request means debate runs or a blocker is recorded; do not down-route to a non-debate workflow, RoutePlan, or broad entry gate.

  Skill Details:

  debate-router: First classify the input shape. Use requirement_debate for raw
  requirements, single_proposal_debate for one proposal, candidate_debate for
  multiple existing candidates, and judgment_debate for conflicting reviews or
  findings. Preserve user-provided candidates or judgments. For
  requirement_debate, generate and normalize only the candidate positions or
  proposals needed for this debate; if external CLI agents were selected or the
  caller used discussion/debate signals, use them as independent proposers
  where practical with `phase: "proposal_generation"` and the 1800s default
  timeout. Normalization deduplicates,
  assigns stable IDs, records proposer source, and degrades if fewer than two
  distinct proposals survive. Require cross-review before arbitration.
  Preserve caller-required or implied final formats. Treat review/re-review/复盘/归档/更新/整理/重审 of Diary, relationship, llmwiki, daily notes, reports, or existing documents as caller_format even when the template is not repeated. If no caller/source format exists, the
  visible output leads with the human-first sections (Decision, Rationale,
  Dissent, Open Questions, optional Next Step, Archive, then Trace last).
  Trace includes CLI statuses when external CLIs were selected or attempted.
  DebateRecord records
  phase-level cli_participation. DebateSummary lives in the archived audit
  envelope under ~/.debate-router/<run-id>/audit.yaml and includes status,
  final_recommendation, up to two source_proposals that materially contributed,
  sourced_amendments accepted by the arbiter with debate_basis, and a short
  derivation. Status reports run health; arbiter.decision reports the
  arbitration action and uses blocked only with status: blocked. The visible
  output should reference the archive path without appending the full YAML only
  when the visible format has a compatible place for that reference.
  Trace rows must trace back to frozen_candidates, source_proposals,
  sourced_amendments, critic findings, or the arbiter decision.

  cli-launch: Use only after external CLI agents were selected. Preserve
  explicit Claude Code, Codex CLI, Copilot CLI, or other CLI requests unless
  unavailable, unsafe, or blocked. Use non-interactive command specs and record
  env/profile, sandbox, network, phase-aware timeout, and redacted display
  commands.
description: "Always-on skill index plus brief execution details with caller-format preservation."
