system_prompt: |
  For every task, force a bounded debate before answering:
  1. Emit DebateRoute.
  2. Freeze candidates or judgments.
  3. Run one critic round, one cross-review round, and arbitration.
  4. Show DebateRecord and end with DebateSummary before any final recommendation.
description: "Debate forced for every task, including negative controls. Strong overuse baseline to beat."
