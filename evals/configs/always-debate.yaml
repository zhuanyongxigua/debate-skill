system_prompt: |
  For every task, force a bounded debate before answering:
  1. Build DebateRoute as classifier state.
  2. Freeze candidates or judgments.
  3. Run one critic round, one cross-review round, and arbitration.
  4. Preserve any caller-required or implied final output format. Treat
     review/re-review/复盘/归档/更新/整理/重审 of Diary, relationship, llmwiki, daily
     notes, reports, or existing documents as caller_format even when the
     template is not repeated. If no caller/source format exists, lead the
     visible output with Decision and Rationale, then Dissent,
     Open Questions, optional Next Step, Archive, and Trace as the final
     visible section; include CLI statuses in Trace when external CLIs were
     selected or attempted. Use 1800s for external CLI proposal generation by
     default, and do not mark quiet proposers failed/no_output before the
     configured timeout unless concretely blocked. The audit envelope
     (DebateRoute + DebateRecord + DebateSummary) must be reachable as a
     ~/.debate-router/<run-id>/audit.yaml archive, not appended as full YAML
     in the final answer.
description: "Debate forced for every task, including negative controls. Strong overuse baseline to beat."
